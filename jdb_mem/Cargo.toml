[package]
name = "jdb_mem"
version = "0.1.0"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/js0/jdb.git"
homepage = "https://github.com/js0/jdb/tree/main/jdb_mem"
description = "jdb_mem"
keywords = ["database", "memtable", "kv-store", "embedded"]
categories = ["database", "data-structures"]
readme = "README.md"

[features]
default = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
hipstr = "0.8.0"
jdb_base = { version = "0.1.1", path = "../jdb_base" }

[dev-dependencies]
aok = "0.1.18"
compio = { version = "0.17.0", features = ["macros"] }
log = "0.4.29"
log_init = "0.1.34"
proptest = "1.9.0"
static_init = "1.0.4"
